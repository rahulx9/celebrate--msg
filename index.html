<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question for You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="main-content">
        <div id="initial-card">
            
            <img id="main-gif" src="./assets/baseImage.png" alt="Asking nicely">
            <h1 id="question-text">Will you go out on a date with me?</h1>
            
            <div class="button-container">
                <button class="btn btn-yes" id="yes-button">Yes 💖</button>
                <button class="btn btn-no" id="no-button">No 🙈</button>
            </div>
        </div>

        <div id="success-message" style="display: none;">
            <h1>YAY! I can't wait! 🥰</h1>
            <p>I knew you'd make my day!</p>
            <img src="./assets/celebration-gif.gif" alt="Celebration time!">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
